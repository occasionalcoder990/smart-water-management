services:
  - type: web
    name: smart-water-management
    runtime: node
    buildCommand: npm install --include-dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_MOCK_DB
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
